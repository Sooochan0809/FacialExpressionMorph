<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FacialExpressionMorphing</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      margin: 0;
      padding: 1rem;
      font-family: sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      display: flex;
      padding: 1rem;
      height: 72px;
      background: #bbbbbb;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: normal;
    }

    footer {
      display: flex;
      padding: 1rem;
      height: 80px;
      background: #bbbbbb;
      align-items: center;
      justify-content: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem 1rem;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-row {
      display: flex;
      flex: 1;
      width: 100%;
      min-width: 0;
      gap: 1rem;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
    }

    .preview-item {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      flex: 0 0 auto;
      scroll-snap-align: start;
      width: calc(100vw - 2rem);
      max-width: 420px;
    }

    .preview-item span {
      font-size: 0.75rem;
    }

    .preview-item video,
    .preview-item canvas {
      width: 100%;
      aspect-ratio: 3 / 4;
      height: auto;
      box-sizing: border-box;
      border: 1px solid #ccc;
      background: #f5f5f5;
      object-fit: cover;
      display: block;
    }

    #captureABtn {
      background-color: #ff0000;
      color: white;
      border: none;
      padding: 0.5rem;
      font-size: 2rem;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      aspect-ratio: 1 / 1;
    }

    #captureBBtn {
      background-color: #0000ff;
      color: white;
      border: none;
      padding: 0.5rem;
      font-size: 2rem;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      aspect-ratio: 1 / 1;
    }

    @media (min-width: 721px) {
      .preview-row {
        justify-content: center;
      }

      .preview-item {
        width: min(420px, calc((100vw - 5rem) / 2));
      }
    }

    @media (max-width: 600px) {
      header {
        height: 32px;
      }

      header h1 {
        font-size: 1rem;
      }

      footer {
        height: auto;
        padding: 0.5rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>FacialExpressionMorphing</h1>
  </header>
  <main>
    <div class="preview-row">
      <div class="preview-item">
        <video id="video" autoplay playsinline muted></video>
        <span>Camera</span>
      </div>

      <div class="preview-item">
        <canvas id="shotA"></canvas>
        <span>A</span>
      </div>

      <div class="preview-item">
        <canvas id="shotB"></canvas>
        <span>B</span>
      </div>

      <div class="preview-item">
        <canvas id="canvas"></canvas>
        <span>Result</span>
      </div>
    </div>
  </main>

  <footer>
    <div class="controls">
      <button id="captureABtn" type="button">A</button>
      <button id="captureBBtn" type="button">B</button>

      <div class="slider-group">
        <input id="tRange" type="range" min="0" max="1" step="0.01" value="0.5" />
        <span id="tValue">0.50</span>
      </div>
    </div>
  </footer>

  <script type="module">
    import { FilesetResolver, FaceLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";
    import Delaunator from "https://cdn.jsdelivr.net/npm/delaunator@5/+esm";

    const OUTPUT_WIDTH = 300;
    const OUTPUT_HEIGHT = 400;
    const OUTPUT_RATIO = OUTPUT_WIDTH / OUTPUT_HEIGHT;

    const video = document.getElementById("video");
    const captureABtn = document.getElementById("captureABtn");
    const captureBBtn = document.getElementById("captureBBtn");

    const tRange = document.getElementById("tRange");
    const tValue = document.getElementById("tValue");

    const shotACanvas = document.getElementById("shotA");
    const shotBCanvas = document.getElementById("shotB");
    const resultCanvas = document.getElementById("canvas");
    const resultCtx = resultCanvas.getContext("2d");

    let stream = null;
    let faceLandmarker = null;

    let imgA = null;
    let imgB = null;

    function syncSliderLabel() {
      tValue.textContent = Number(tRange.value).toFixed(2);
    }

    syncSliderLabel();

    tRange.addEventListener("input", () => {
      syncSliderLabel();

      if (imgA && imgB) {
        try {
          renderMorph();
        } catch (err) {
          console.error(err);
        }
      }
    });

    async function createLandmarker() {
      if (faceLandmarker) return faceLandmarker;

      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        },
        runningMode: "IMAGE",
        numFaces: 1,
      });

      return faceLandmarker;
    }

    async function startCamera() {
      if (stream) return stream;

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 960 }
        },
        audio: false,
      });

      video.srcObject = stream;

      await new Promise((resolve) => {
        video.onloadedmetadata = () => resolve();
      });

      await video.play();
      return stream;
    }

    function getCenteredCropRect(srcWidth, srcHeight, targetRatio) {
      const srcRatio = srcWidth / srcHeight;

      if (srcRatio > targetRatio) {
        const cropHeight = srcHeight;
        const cropWidth = cropHeight * targetRatio;
        const sx = (srcWidth - cropWidth) / 2;
        return { sx, sy: 0, sw: cropWidth, sh: cropHeight };
      } else {
        const cropWidth = srcWidth;
        const cropHeight = cropWidth / targetRatio;
        const sy = (srcHeight - cropHeight) / 2;
        return { sx: 0, sy, sw: cropWidth, sh: cropHeight };
      }
    }

    function prepareOutputCanvas(targetCanvas) {
      targetCanvas.width = OUTPUT_WIDTH;
      targetCanvas.height = OUTPUT_HEIGHT;
      const ctx = targetCanvas.getContext("2d");
      ctx.clearRect(0, 0, OUTPUT_WIDTH, OUTPUT_HEIGHT);
      return ctx;
    }

    function captureFrameToCanvas(targetCanvas) {
      const srcWidth = video.videoWidth;
      const srcHeight = video.videoHeight;

      if (!srcWidth || !srcHeight) {
        throw new Error("カメラ映像の取得に失敗しました。");
      }

      const { sx, sy, sw, sh } = getCenteredCropRect(srcWidth, srcHeight, OUTPUT_RATIO);
      const ctx = prepareOutputCanvas(targetCanvas);

      ctx.drawImage(
        video,
        sx, sy, sw, sh,
        0, 0, OUTPUT_WIDTH, OUTPUT_HEIGHT
      );
    }

    async function canvasToImage(canvas) {
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) {
        throw new Error("画像化に失敗しました。");
      }
      return await createImageBitmap(blob);
    }

    function getLandmarks(imgLike) {
      const result = faceLandmarker.detect(imgLike);

      if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
        throw new Error("顔が検出できませんでした。正面に近い状態で撮影してください。");
      }

      const width = imgLike.width;
      const height = imgLike.height;

      const points = result.faceLandmarks[0].map((p) => [
        p.x * width,
        p.y * height,
      ]);

      points.push([0, 0]);
      points.push([width - 1, 0]);
      points.push([width - 1, height - 1]);
      points.push([0, height - 1]);

      return points;
    }

    function interpolatePoints(pointsA, pointsB, t) {
      if (pointsA.length !== pointsB.length) {
        throw new Error("ランドマーク数が一致しません。");
      }

      return pointsA.map((pa, i) => {
        const pb = pointsB[i];
        return [
          pa[0] * (1 - t) + pb[0] * t,
          pa[1] * (1 - t) + pb[1] * t,
        ];
      });
    }

    function clipTriangle(ctx, tri) {
      ctx.beginPath();
      ctx.moveTo(tri[0][0], tri[0][1]);
      ctx.lineTo(tri[1][0], tri[1][1]);
      ctx.lineTo(tri[2][0], tri[2][1]);
      ctx.closePath();
      ctx.clip();
    }

    function drawTriangleImage(ctx, img, srcTri, dstTri) {
      const [sx0, sy0] = srcTri[0];
      const [sx1, sy1] = srcTri[1];
      const [sx2, sy2] = srcTri[2];

      const [dx0, dy0] = dstTri[0];
      const [dx1, dy1] = dstTri[1];
      const [dx2, dy2] = dstTri[2];

      const denom =
        sx0 * (sy1 - sy2) +
        sx1 * (sy2 - sy0) +
        sx2 * (sy0 - sy1);

      if (Math.abs(denom) < 1e-6) return;

      const a = (dx0 * (sy1 - sy2) + dx1 * (sy2 - sy0) + dx2 * (sy0 - sy1)) / denom;
      const b = (dy0 * (sy1 - sy2) + dy1 * (sy2 - sy0) + dy2 * (sy0 - sy1)) / denom;
      const c = (dx0 * (sx2 - sx1) + dx1 * (sx0 - sx2) + dx2 * (sx1 - sx0)) / denom;
      const d = (dy0 * (sx2 - sx1) + dy1 * (sx0 - sx2) + dy2 * (sx1 - sx0)) / denom;
      const e = (dx0 * (sx1 * sy2 - sx2 * sy1) + dx1 * (sx2 * sy0 - sx0 * sy2) + dx2 * (sx0 * sy1 - sx1 * sy0)) / denom;
      const f = (dy0 * (sx1 * sy2 - sx2 * sy1) + dy1 * (sx2 * sy0 - sx0 * sy2) + dy2 * (sx0 * sy1 - sx1 * sy0)) / denom;

      ctx.save();
      clipTriangle(ctx, dstTri);
      ctx.setTransform(a, b, c, d, e, f);
      ctx.drawImage(img, 0, 0);
      ctx.restore();
    }

    function morphImages(imgA, imgB, pointsA, pointsB, t) {
      resultCanvas.width = OUTPUT_WIDTH;
      resultCanvas.height = OUTPUT_HEIGHT;
      resultCtx.clearRect(0, 0, OUTPUT_WIDTH, OUTPUT_HEIGHT);

      const midPoints = interpolatePoints(pointsA, pointsB, t);
      const delaunay = Delaunator.from(midPoints);
      const triangles = delaunay.triangles;

      resultCtx.save();
      resultCtx.globalAlpha = 1 - t;
      for (let i = 0; i < triangles.length; i += 3) {
        const i0 = triangles[i];
        const i1 = triangles[i + 1];
        const i2 = triangles[i + 2];

        drawTriangleImage(
          resultCtx,
          imgA,
          [pointsA[i0], pointsA[i1], pointsA[i2]],
          [midPoints[i0], midPoints[i1], midPoints[i2]]
        );
      }
      resultCtx.restore();

      resultCtx.save();
      resultCtx.globalAlpha = t;
      for (let i = 0; i < triangles.length; i += 3) {
        const i0 = triangles[i];
        const i1 = triangles[i + 1];
        const i2 = triangles[i + 2];

        drawTriangleImage(
          resultCtx,
          imgB,
          [pointsB[i0], pointsB[i1], pointsB[i2]],
          [midPoints[i0], midPoints[i1], midPoints[i2]]
        );
      }
      resultCtx.restore();
    }

    function renderMorph() {
      if (!imgA || !imgB) {
        throw new Error("AとBを先に撮影してください。");
      }

      const t = Number(tRange.value);
      const pointsA = getLandmarks(imgA);
      const pointsB = getLandmarks(imgB);

      morphImages(imgA, imgB, pointsA, pointsB, t);
    }

    async function initializeApp() {
      try {
        await createLandmarker();
        await startCamera();
      } catch (err) {
        console.error(err);
        alert(err.message || "カメラ開始に失敗しました。");
      }
    }

    captureABtn.addEventListener("click", async () => {
      try {
        captureFrameToCanvas(shotACanvas);
        imgA = await canvasToImage(shotACanvas);

        if (imgA && imgB) {
          renderMorph();
        }
      } catch (err) {
        console.error(err);
        alert(err.message || "Aの撮影に失敗しました。");
      }
    });

    captureBBtn.addEventListener("click", async () => {
      try {
        captureFrameToCanvas(shotBCanvas);
        imgB = await canvasToImage(shotBCanvas);

        if (imgA && imgB) {
          renderMorph();
        }
      } catch (err) {
        console.error(err);
        alert(err.message || "Bの撮影に失敗しました。");
      }
    });

    initializeApp();
  </script>
</body>

</html>
